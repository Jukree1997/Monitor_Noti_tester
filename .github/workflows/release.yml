name: Build release installers

# Two ways to trigger:
#   1. Push a v* tag → builds + creates a public Release with both
#      installers attached. This is the normal release flow.
#   2. Manual run from the Actions tab → builds and uploads as run
#      artifacts (no Release created). Useful for dry-run testing
#      after changing the spec / installer scripts.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

# Both build jobs run in parallel. The release job waits for both,
# downloads their artifacts, and creates the GitHub Release.
permissions:
  contents: write

jobs:
  # ─────────────────────────────────────────────────────────────────
  # Linux: PyInstaller → AppImage
  # ─────────────────────────────────────────────────────────────────
  build-linux:
    # PIN to ubuntu-22.04 (glibc 2.35), NOT ubuntu-latest.
    # `ubuntu-latest` moved to 24.04 (glibc 2.39) in April 2025; the
    # resulting AppImage refuses to start on 22.04 LTS systems with
    # "GLIBC_2.38 not found" because libpython linked against the
    # newer host glibc. 22.04 is the oldest GitHub-supported runner
    # (20.04 was retired) and covers Ubuntu 22.04 LTS + 24.04 LTS +
    # Debian 12+. Customers on older distros need to upgrade or use
    # the libfuse2 + extract-and-run path.
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxcb-xinerama0 \
            libxkbcommon-x11-0 \
            libegl1 \
            libgl1 \
            libxcb-cursor0 \
            libdbus-1-3

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller pillow

      - name: Build PyInstaller bundle
        run: pyinstaller --clean --noconfirm MNT.spec

      - name: Download appimagetool
        run: |
          mkdir -p build_tools
          wget -q -O build_tools/appimagetool \
            https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x build_tools/appimagetool

      - name: Build AppImage
        # appimagetool itself is an AppImage and needs FUSE to run;
        # CI runners don't have FUSE so use --appimage-extract-and-run.
        run: |
          export APPIMAGE_EXTRACT_AND_RUN=1
          ./build_appimage.sh

      - name: Verify AppImage size under GitHub's 2 GiB limit
        run: |
          SIZE=$(stat -c '%s' MNT-*-x86_64.AppImage)
          LIMIT=2147483648
          echo "AppImage size: $SIZE bytes (limit: $LIMIT)"
          if [ "$SIZE" -ge "$LIMIT" ]; then
            echo "ERROR: AppImage exceeds GitHub Releases per-file limit (2 GiB)"
            echo "Trim the PySide6/onnxruntime/etc. bundle in MNT.spec further"
            exit 1
          fi

      - name: Verify bundled libs don't require glibc > 2.35
        # Customers on Ubuntu 22.04 (glibc 2.35) will get "GLIBC_2.X
        # not found" if any bundled .so requires a newer symbol. This
        # check fails the build if that happens — usually means the
        # runner version was bumped and we need to re-pin.
        run: |
          set -e
          MAX_ALLOWED="2.35"
          echo "Scanning bundled .so files for required glibc symbols (max allowed: GLIBC_${MAX_ALLOWED})"
          HIGHEST=$(find dist/MNT -name "*.so*" -type f -exec objdump -T {} \; 2>/dev/null \
            | grep -oE 'GLIBC_[0-9]+\.[0-9]+' \
            | sort -V \
            | tail -1)
          echo "Highest glibc requirement found in bundle: $HIGHEST"
          # Compare HIGHEST vs GLIBC_2.35 using version sort
          HIGHEST_VER="${HIGHEST#GLIBC_}"
          if [ "$(printf '%s\n%s\n' "$HIGHEST_VER" "$MAX_ALLOWED" | sort -V | tail -1)" != "$MAX_ALLOWED" ]; then
            echo "ERROR: Bundle requires GLIBC_${HIGHEST_VER} which is > ${MAX_ALLOWED}"
            echo "Customers on Ubuntu 22.04 will see 'GLIBC not found' errors."
            echo "Either pin the runner to an older Ubuntu (currently ubuntu-22.04)"
            echo "or update MAX_ALLOWED above if you've intentionally raised the floor."
            exit 1
          fi
          echo "OK — bundle is compatible with glibc ${MAX_ALLOWED}+"

      - name: Upload AppImage as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-appimage
          path: MNT-*-x86_64.AppImage
          retention-days: 7
          if-no-files-found: error

  # ─────────────────────────────────────────────────────────────────
  # Windows: PyInstaller → Inno Setup installer
  # ─────────────────────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller pillow

      - name: Build PyInstaller bundle
        run: pyinstaller --clean --noconfirm MNT.spec

      - name: Install Inno Setup
        # choco is pre-installed on windows-latest runners
        run: choco install innosetup -y --no-progress

      - name: Compile installer
        # ISCC installs to "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" MNT.iss

      - name: Verify installer size under GitHub's 2 GiB limit
        shell: bash
        run: |
          SIZE=$(stat -c '%s' Output/MNT-Setup-*.exe)
          LIMIT=2147483648
          echo "Installer size: $SIZE bytes (limit: $LIMIT)"
          if [ "$SIZE" -ge "$LIMIT" ]; then
            echo "ERROR: Installer exceeds GitHub Releases per-file limit (2 GiB)"
            exit 1
          fi

      - name: Upload installer as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: Output/MNT-Setup-*.exe
          retention-days: 7
          if-no-files-found: error

  # ─────────────────────────────────────────────────────────────────
  # Release: attach both installers to the GitHub Release for this tag
  # ─────────────────────────────────────────────────────────────────
  release:
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    # Only create a release on tag push, not on manual workflow_dispatch
    # (which is just a dry-run build test).
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Download Linux AppImage
        uses: actions/download-artifact@v4
        with:
          name: linux-appimage
          path: release_assets

      - name: Download Windows installer
        uses: actions/download-artifact@v4
        with:
          name: windows-installer
          path: release_assets

      - name: List artifacts
        run: ls -la release_assets/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          # Auto-generates release notes from commits since the last tag.
          # Edit the release on GitHub afterwards to add a customer-
          # facing changelog if you want.
          generate_release_notes: true
          # Default: NOT a pre-release. Change to true if shipping a beta.
          prerelease: false
          # Attach both installers
          files: |
            release_assets/MNT-*-x86_64.AppImage
            release_assets/MNT-Setup-*.exe
          # Body shown above the auto-generated changelog
          body: |
            ## Install

            ### Windows

            Download `MNT-Setup-${{ github.ref_name }}.exe`, double-click, follow the install wizard.

            ### Linux (Ubuntu 22.04+ / Debian 12+ / Fedora / Arch)

            1. Download `MNT-${{ github.ref_name }}-x86_64.AppImage`.
            2. Make it executable: right-click → Properties → Permissions → check **"Allow executing as program"** (or `chmod +x` in terminal).
            3. **If you're on Ubuntu 22.04+ or any distro that doesn't ship libfuse2**, install it once:
               ```
               sudo apt update && sudo apt install -y libfuse2
               ```
               (or `libfuse2t64` on Ubuntu 24.04+ if `libfuse2` reports missing). Without this, double-click does nothing.
            4. Double-click the AppImage to launch.

            ### After install

            Activate with the license key sent at purchase. See **Help → Check for updates** inside the app for future updates.
